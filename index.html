<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dfh-scaffold</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        if (e.message && e.message.includes('ResizeObserver')) return;
        document.getElementById('root').innerHTML =
          '<pre style="color:red;padding:20px;white-space:pre-wrap">UNCAUGHT: ' + e.message + '\n' + (e.filename||'') + ':' + (e.lineno||'') + '</pre>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('root').innerHTML =
          '<pre style="color:red;padding:20px;white-space:pre-wrap">UNHANDLED REJECTION: ' + (e.reason?.message || e.reason || String(e)) + '\n' + (e.reason?.stack || '') + '</pre>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
